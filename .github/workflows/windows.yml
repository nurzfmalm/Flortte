name: Windows build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build:win
      - uses: actions/upload-artifact@v4
        with:
          name: Flortte-Windows
          path: dist/Flortte-Setup-*.exe
          if-no-files-found: error
