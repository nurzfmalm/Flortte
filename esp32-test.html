<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ESP32 Fetch Test</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; line-height: 1.45; }
    button { padding: 10px 14px; }
    pre { padding: 12px; background: #111827; color: #e5e7eb; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>ESP32 Fetch Test</h1>
  <button id="run">Fetch /esp32/state proxy</button>
  <button id="run80">Fetch /state on 80</button>
  <button id="run8080">Fetch /state on 8080</button>
  <pre id="out">Waiting...</pre>

  <script>
    const out = document.getElementById('out');
    async function run(url = 'http://127.0.0.1:8000/esp32/state') {
      out.textContent = `Fetching ${url} ...`;
      try {
        const res = await fetch(url, {
          cache: 'no-store',
          signal: AbortSignal.timeout(5000),
        });
        const text = await res.text();
        out.textContent = `HTTP ${res.status}\n\n${text}`;
      } catch (err) {
        out.textContent = `${err.name}: ${err.message}`;
      }
    }
    document.getElementById('run').addEventListener('click', () => run());
    document.getElementById('run80').addEventListener('click', () => run('http://192.168.4.1/state'));
    document.getElementById('run8080').addEventListener('click', () => run('http://192.168.4.1:8080/state'));
    run();
  </script>
</body>
</html>
